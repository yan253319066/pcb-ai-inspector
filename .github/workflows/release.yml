name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: pcb-ai-inspector

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd pcb-ai-inspector
          pip install -e .
          pip install pyinstaller

      - name: Build exe
        run: |
          cd pcb-ai-inspector
          pyinstaller build.spec --noconfirm

      - name: Zip distribution
        run: |
          cd pcb-ai-inspector
          Compress-Archive -Path "dist/PCB-AI-Inspector" -DestinationPath "PCB-AI-Inspector.zip"

      - name: Create Release
        run: |
          cd pcb-ai-inspector
          gh release create ${{ github.event.inputs.version }} --title "Release ${{ github.event.inputs.version }}" --draft PCB-AI-Inspector.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}